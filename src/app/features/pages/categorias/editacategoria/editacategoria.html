<div class="layout">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <a routerLink="/listaproducto">LISTA CATEGORIA</a>
  </nav>

  <!-- CONTENIDO -->
  <div class="main">

    <div class="form-box">

      <h1>FORMULARIO<br>PARA CREAR CATEGORÍA</h1>

      <form class="form">

        <!-- NOMBRE -->
        <input type="text" placeholder="Nombre de la categoría">

        <!-- DESCRIPCIÓN -->
        <textarea placeholder="Descripción de la categoría"></textarea>

        <!-- ESTADO -->
        <div class="status-container">
          <label>Estado</label>
          <select>
            <option>Activa</option>
            <option>Inactiva</option>
          </select>
        </div>

        <!-- BOTÓN -->
        <button type="submit" class="btn-create">
          CREAR CATEGORÍA
        </button>

      </form>

    </div>

  </div>

</div>
