<div class="layout">

  <!-- CONTENIDO PRINCIPAL -->
  <div class="main">

    <div class="header">
      <h1>LISTA DE CATEGORIAS</h1>
       <a class="btn-add" routerLink="/creacategoria"> AGREGA CATEGORIA</a>
      </div>

      <div class="table-container">

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>NOMBRE</th>
            <th>DESCRIPCIÓN</th>
            <th>ACTIVA</th>
            <th>ACCIONES</th>
          </tr>
        </thead>

        <tbody>
          @for( categoria of ( categorias | async); track $index  ) {
             <tr>
            <td>{{ categoria._id }}</td>
            <td>{{ categoria.nombre }}</td>
            <td>{{ categoria.descripcion}}</td>
            <td>{{ categoria.activa}}</td>
            <td>
              <button>Editar</button>
              <button>Eliminar</button>
            </td>
          </tr>
          }
        </tbody>
      </table>

      <div class="footer-table">
        <span>Mostrando productos</span>
        <span>Página 1 de 1</span>
      </div>

    </div>
  </div>
</div>
