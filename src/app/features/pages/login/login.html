<div class="login-container">

    <div class="login-card">

        <h2>INICIAR SESIÓN</h2>

        <form>

            <input
            type="email"
            placeholder="Correo electrónico"
            required
            >

            <input
            type="password"
            placeholder="Contraseña"
            required
            >

            <button type="submit">
                INGRESAR
            </button>

        </form>

        <p class="register-link">
            ¿No tienes cuenta?
            <a routerLink="/register">Regístrate aquí</a>
        </p>

    </div>

</div>
