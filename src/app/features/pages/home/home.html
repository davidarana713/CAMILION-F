<!-- DESTACADA -->
<div class="Fondo-Home">
<section class="featured">

  <div class="featured-content">

    <div class="featured-text">
      <span class="featured-tag">DESTACADA</span>

      <h1>NUEVAS<br>CAMISETAS</h1>

      <div class="buttons1">
        <button class="btn-primary">VER MÁS</button>
        <button class="btn-secondary">NUEVAS CAMISETAS</button>
      </div>
    </div>

    <!-- Camiseta -->
    <img
      class="shirt"
      src="assets/images/camisa.png"
      alt="Camiseta destacada"
    >

  </div>

</section>
<!-- SECCIÓN CAMISETAS -->

<h2 class="section-title">NUEVAS CAMISETAS</h2>

<section class="section">
<div class="products-grid">
@for (producto of (productos | async); track $index){

      <div class="product-card">
        <img [src]="producto.img" [alt]="producto.nombre" width="300px" height="300px">
        <p> {{ producto.nombre }}</p>
        <p>{{ producto.precio |currency}}</p>

        <p></p>
        <button (click)="addToCart(producto)">Agregar</button>
      </div>
    }
  </div>
</section>
</div>
