<div class="register-container">

    <div class="register-card">

        <h2>REGISTRARSE</h2>

        <form [formGroup]="formData" (ngSubmit)="onSubmit()">

            <input formControlName="nombre" type="text" placeholder="Nombre" required>

            <input formControlName="correo" type="email" placeholder="Correo electrónico" required>

            <input formControlName="telefono" type="tel" placeholder="Teléfono" required>

            <input formControlName="edad" type="number" placeholder="Edad" required>

            <input formControlName="pin" type="password" placeholder="Pin" required>

            <input formControlName="confirmapin" type="password" placeholder="Confirmar Pin" required>

            <select formControlName="rol">
                <option value="">Seleccionar rol</option>
                <option value="admin">Administrador</option>
                <option value="ayudante">Ayudante</option>
                <option value="usuario">Usuario</option>
            </select>

            <button type="submit">
                CREAR CUENTA
            </button>

        </form>

        <p class="login-link">
            ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
        </p>

    </div>

</div>
